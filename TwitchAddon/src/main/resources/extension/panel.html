<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanalpunkte</title>
  <!-- Twitch Extension Helper -->
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <style>
    :root {
      --purple: #9147ff;
      --purple-dark: #6a0dad;
      --bg: #18181b;
      --surface: #1f1f23;
      --surface2: #26262c;
      --text: #efeff1;
      --text-muted: #adadb8;
      --gold: #ffd700;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .header svg { flex-shrink: 0; }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--purple);
    }

    .points-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid var(--surface2);
    }

    .points-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .points-value {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--gold);
      line-height: 1.1;
    }

    .points-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    /* Leaderboard */
    .leaderboard {
      margin-bottom: 16px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .leaderboard-row:nth-child(odd) { background: var(--surface); }
    .leaderboard-row:nth-child(even) { background: var(--surface2); }

    .leaderboard-rank {
      width: 22px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      flex-shrink: 0;
    }

    .leaderboard-rank.top1 { color: #ffd700; }
    .leaderboard-rank.top2 { color: #c0c0c0; }
    .leaderboard-rank.top3 { color: #cd7f32; }

    .leaderboard-name {
      flex: 1;
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-pts {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    /* Rewards shop */
    .rewards-list { margin-bottom: 8px; }

    .reward-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: var(--surface);
      border: 1px solid var(--surface2);
    }

    .reward-name {
      flex: 1;
      font-size: 0.82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .reward-cost {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--purple);
      flex-shrink: 0;
    }

    .status-msg {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      padding: 20px 0;
    }

    .error-msg {
      font-size: 0.78rem;
      color: #ff6b6b;
      text-align: center;
      padding: 10px 0;
    }

    .not-registered {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <div class="header">
    <!-- Coin icon -->
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="#ffd700" opacity="0.2"/>
      <circle cx="12" cy="12" r="10" stroke="#ffd700" stroke-width="1.5"/>
      <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffd700">P</text>
    </svg>
    <h1>Kanalpunkte</h1>
  </div>

  <div id="myPoints">
    <div class="status-msg">Lade Punkte…</div>
  </div>

  <div class="leaderboard">
    <div class="section-title">🏆 Top 10</div>
    <div id="leaderboardList"><div class="status-msg">Lade Rangliste…</div></div>
  </div>

  <div class="rewards-list">
    <div class="section-title">🎁 Rewards (Shop)</div>
    <div id="rewardsList"><div class="status-msg">Lade Rewards…</div></div>
  </div>

  <script>
    // --- Configuration ---
    // The EBS base URL must be set to where the Java OverlayApiServer is reachable over HTTPS.
    // During development you can use an ngrok tunnel; in production set this to your server URL.
    const EBS_BASE_URL = window.location.origin.startsWith('https://') ? window.location.origin : '';

    let viewerUserId = null;

    function formatPoints(n) {
      return Number(n).toLocaleString('de-DE');
    }

    function rankClass(i) {
      if (i === 0) return 'top1';
      if (i === 1) return 'top2';
      if (i === 2) return 'top3';
      return '';
    }

    function rankEmoji(i) {
      if (i === 0) return '🥇';
      if (i === 1) return '🥈';
      if (i === 2) return '🥉';
      return String(i + 1);
    }

    async function loadMyPoints(userId) {
      const el = document.getElementById('myPoints');
      try {
        const res = await fetch(`${EBS_BASE_URL}/api/points?user_id=${encodeURIComponent(userId)}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.registered) {
          el.innerHTML = `<div class="not-registered">Du bist noch nicht in der Datenbank.<br>Schau beim nächsten Stream vorbei!</div>`;
        } else {
          el.innerHTML = `
            <div class="points-card">
              <div class="points-label">Deine Punkte</div>
              <div class="points-value">${formatPoints(data.points)}</div>
              <div class="points-sub">Kanalpunkte (PTP)</div>
            </div>`;
        }
      } catch (e) {
        el.innerHTML = `<div class="error-msg">Punkte konnten nicht geladen werden.</div>`;
      }
    }

    async function loadLeaderboard() {
      const el = document.getElementById('leaderboardList');
      try {
        const res = await fetch(`${EBS_BASE_URL}/api/leaderboard?limit=10`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.length) {
          el.innerHTML = `<div class="status-msg">Noch keine Einträge.</div>`;
          return;
        }
        el.innerHTML = data.map((entry, i) => `
          <div class="leaderboard-row">
            <span class="leaderboard-rank ${rankClass(i)}">${rankEmoji(i)}</span>
            <span class="leaderboard-name">${escapeHtml(entry.display_name || entry.twitch_user_id)}</span>
            <span class="leaderboard-pts">${formatPoints(entry.points)}</span>
          </div>`).join('');
      } catch (e) {
        el.innerHTML = `<div class="error-msg">Rangliste konnte nicht geladen werden.</div>`;
      }
    }

    async function loadRewards() {
      const el = document.getElementById('rewardsList');
      try {
        const res = await fetch(`${EBS_BASE_URL}/api/rewards`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const enabled = data.filter(r => r.is_enabled !== false);
        if (!enabled.length) {
          el.innerHTML = `<div class="status-msg">Keine Rewards verfügbar.</div>`;
          return;
        }
        el.innerHTML = enabled.map(r => `
          <div class="reward-item">
            <span class="reward-name">${escapeHtml(r.name || r.description || 'Reward')}</span>
            <span class="reward-cost">${formatPoints(r.cost)} P</span>
          </div>`).join('');
      } catch (e) {
        el.innerHTML = `<div class="error-msg">Rewards konnten nicht geladen werden.</div>`;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // --- Twitch Extension Helper ---
    window.Twitch.ext.onAuthorized(function (auth) {
      // auth.userId is the opaque user ID (only available when user shared identity)
      viewerUserId = auth.userId || null;

      if (viewerUserId && viewerUserId !== '0' && viewerUserId !== '') {
        loadMyPoints(viewerUserId);
      } else {
        document.getElementById('myPoints').innerHTML =
          `<div class="not-registered">Melde dich in Twitch an, um deine Punkte zu sehen.</div>`;
      }
    });

    // Always load leaderboard and rewards (public data)
    loadLeaderboard();
    loadRewards();

    // Refresh every 60 seconds
    setInterval(() => {
      loadLeaderboard();
      loadRewards();
      if (viewerUserId && viewerUserId !== '0') {
        loadMyPoints(viewerUserId);
      }
    }, 60000);
  </script>
</body>
</html>
