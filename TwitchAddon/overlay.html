<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Overlay</title>
    <link rel="stylesheet" href="./overlay.css">
</head>
<body>
  <div id="media"></div>

  <!-- Debug-Panel -->
  <div id="debugPanel" class="debug-panel">
    <div class="debug-actions">
      <button onclick="document.getElementById('debugPanel').style.display='none'" class="debug-button debug-button-close">X Schliessen</button>
      <button onclick="clearDebugLogs()" class="debug-button debug-button-clear">Clear</button>
      <button onclick="testTTSManual()" class="debug-button debug-button-test">Test TTS</button>
    </div>
    <pre id="debugLog" class="debug-log"></pre>
  </div>

  <script src="./overlay-debug.js"></script>
  <script src="./overlay-main.js"></script>
</body>
</html>
