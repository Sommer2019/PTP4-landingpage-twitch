name: Integrated CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Versionsberechnung ──────────────────────────────────────────
  compute-version:
    if: github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'dev'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: semver
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -vE '\-' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            COMMITS=$(git log --format="%s%n%b%n")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s%n%b%n")
          fi
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          BUMP="patch"
          if echo "$COMMITS" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:|BREAKING CHANGE|BREAKING[[:space:]]|\bBREAK[A-Z]'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          fi
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  # ─── 2. Validierung & Security (JS/TS Focused) ──────────────────────
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node & Bun
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: oven-sh/setup-bun@v2

      - name: Landingpage Validierung
        run: |
          npm ci
          npm run lint
          npx tsc -b
          npm run test

      - name: DiscordBot Validierung
        working-directory: DiscordBot
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npx tsc --noEmit

      - name: TwitchAddon Validierung
        working-directory: TwitchAddon
        run: |
          bun install
          bun build index.ts --target=bun --outfile /tmp/twitch-smoke.js

      # --- Security Scans für Node.js/TypeScript ---
      - name: NPM Audit (Check for vulnerabilities)
        run: npm audit --audit-level=high

      - name: Retire.js Scan (OWASP JS Security Tool)
        run: |
          npm install -g retire
          mkdir -p reports
          retire --path . --outputformat json --outputpath reports/retire-report.json --severity high
        continue-on-error: false

      - name: Upload Security Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: reports/

  # ─── 3. TwitchAddon EXE Build & Release ─────────────────────────────
  release-twitchaddon:
    needs: [validate, compute-version]
    if: github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'dev'
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Get Twitch OAuth Access Token
        id: get_oauth
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d "client_id=${{ secrets.VITE_TWITCH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TWITCH_CLIENT_SECRET }}" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${{ secrets.TWITCH_REFRESH_TOKEN }}")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r .access_token)
          echo "::add-mask::$ACCESS_TOKEN"
          echo "TWITCH_OAUTH_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Create .env
        shell: bash
        run: |
          printf 'SUPABASE_URL=%s\n'          "${{ secrets.VITE_SUPABASE_URL }}"      > TwitchAddon/.env
          printf 'SUPABASE_API_KEY=%s\n'      "${{ secrets.SUPABASE_API_KEY }}"       >> TwitchAddon/.env
          printf 'TWITCH_OAUTH_TOKEN=%s\n'    "${{ env.TWITCH_OAUTH_TOKEN }}"         >> TwitchAddon/.env
          printf 'TWITCH_CLIENT_ID=%s\n'      "${{ secrets.VITE_TWITCH_CLIENT_ID }}"  >> TwitchAddon/.env
          printf 'TWITCH_CLIENT_SECRET=%s\n'  "${{ secrets.TWITCH_CLIENT_SECRET }}"   >> TwitchAddon/.env
          printf 'CHANNEL_NAME=%s\n'          "${{ secrets.CHANNEL_NAME }}"           >> TwitchAddon/.env
          printf 'TWITCH_REFRESH_TOKEN=%s\n'  "${{ secrets.TWITCH_REFRESH_TOKEN }}"   >> TwitchAddon/.env
          printf 'EXTENSION_CLIENT_ID=%s\n'   "${{ secrets.EXTENSION_CLIENT_ID }}"    >> TwitchAddon/.env
          printf 'EXTENSION_SECRET=%s\n'      "${{ secrets.EXTENSION_SECRET }}"       >> TwitchAddon/.env
          printf 'NGROK_AUTHTOKEN=%s\n'       "${{ secrets.NGROK_AUTHTOKEN }}"        >> TwitchAddon/.env
          printf 'NGROK_DOMAIN=%s\n'          "${{ secrets.NGROK_DOMAIN }}"           >> TwitchAddon/.env

      - name: Build EXEs
        shell: pwsh
        run: |
          # bun install muss VOR --compile laufen, sonst kennt der Build @supabase/supabase-js nicht.
          Push-Location TwitchAddon
          bun install --no-save
          Pop-Location

          # Bun's --compile ersetzt process.env.X NICHT automatisch durch String-Konstanten.
          # Für jeden im Code per Literal angesprochenen Env-Key bauen wir einen
          # --define-Flag, sodass die Werte beim Build wirklich in die EXE eingebacken werden.
          $envNames = @(
            'SUPABASE_URL', 'SUPABASE_API_KEY', 'SUPABASE_SERVICE_ROLE_KEY',
            'TWITCH_CLIENT_ID', 'TWITCH_CLIENT_SECRET', 'TWITCH_REFRESH_TOKEN',
            'TWITCH_OAUTH_TOKEN', 'CHANNEL_NAME',
            'EXTENSION_SECRET',
            'NGROK_AUTHTOKEN', 'NGROK_DOMAIN'
          )
          $defines = @()
          foreach ($name in $envNames) {
            $val = [Environment]::GetEnvironmentVariable($name)
            if ($null -eq $val) { $val = '' }
            # ConvertTo-Json liefert die JSON-quotierte Form, die --define erwartet.
            $json = $val | ConvertTo-Json -Compress
            $defines += '--define'
            $defines += "process.env.$name=$json"
          }

          & bun build --compile --target=bun-windows-x64 @defines TwitchAddon/index.ts --outfile TwitchAddon/dist/TwitchAddon.exe

          # setup.exe lädt das Repo selbst von GitHub — die URL wird hier eingebacken,
          # damit der Streamer nur die EXE braucht (kein git clone, kein .git-Ordner).
          $repoZipUrl = "https://github.com/$env:GITHUB_REPOSITORY/archive/refs/heads/master.zip"
          $repoZipJson = $repoZipUrl | ConvertTo-Json -Compress
          & bun build --compile --target=bun-windows-x64 --define "process.env.SETUP_REPO_ZIP_URL=$repoZipJson" setup.ts --outfile setup.exe
        env:
          # Werte werden vom run-Block oben via --define in die EXE eingebacken.
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.VITE_TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_REFRESH_TOKEN: ${{ secrets.TWITCH_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          NGROK_DOMAIN: ${{ secrets.NGROK_DOMAIN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXTENSION_SECRET: ${{ secrets.EXTENSION_SECRET }}

      - name: Inject extension config
        # Ersetzt die Sentinel-Strings (__EBS_BASE_URL__, __SUPABASE_URL__,
        # __SUPABASE_ANON__, __PRIVACY_URL__) in den Extension-JS-Dateien
        # durch die echten Werte aus den GitHub-Secrets, BEVOR extension.zip
        # im nächsten Step gepackt wird. Die EBS-URL wird aus NGROK_DOMAIN
        # abgeleitet — dieselbe URL ist in der Twitch-Extension-Allowlist hinterlegt.
        shell: pwsh
        env:
          NGROK_DOMAIN: ${{ secrets.NGROK_DOMAIN }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PRIVACY_URL: ${{ secrets.PRIVACY_URL }}
        run: |
          $missing = @()
          if (-not $env:NGROK_DOMAIN)  { $missing += 'NGROK_DOMAIN' }
          if (-not $env:SUPABASE_URL)  { $missing += 'VITE_SUPABASE_URL' }
          if (-not $env:SUPABASE_ANON) { $missing += 'VITE_SUPABASE_ANON_KEY' }
          if (-not $env:PRIVACY_URL)   { $missing += 'PRIVACY_URL' }
          if ($missing.Count -gt 0) {
            Write-Error ("Fehlende GitHub-Secrets: " + ($missing -join ', '))
            exit 1
          }
          $ebs = "https://$env:NGROK_DOMAIN"
          Get-ChildItem -Path 'TwitchAddon\extension' -Filter '*.js' | ForEach-Object {
            $c = Get-Content -Raw -Path $_.FullName
            $c = $c.Replace('__EBS_BASE_URL__',  $ebs).
                   Replace('__SUPABASE_URL__',  $env:SUPABASE_URL).
                   Replace('__SUPABASE_ANON__', $env:SUPABASE_ANON).
                   Replace('__PRIVACY_URL__',   $env:PRIVACY_URL)
            if ($c -match '__(EBS_BASE_URL|SUPABASE_URL|SUPABASE_ANON|PRIVACY_URL)__') {
              Write-Error ("Sentinel nicht ersetzt in: " + $_.FullName)
              exit 1
            }
            Set-Content -Path $_.FullName -Value $c -NoNewline -Encoding utf8
          }

      - name: Download ngrok
        # Wird neben TwitchAddon.exe ins Release-ZIP gepackt; tunnel.ts spawnt sie
        # automatisch beim EXE-Start.
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri 'https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip' -OutFile ngrok.zip
          Expand-Archive -Path ngrok.zip -DestinationPath TwitchAddon/dist -Force
          Remove-Item ngrok.zip

      - name: Package Release
        # Eine einzige TwitchAddon.exe + ngrok.exe + statische Assets. Keine .env
        # im ZIP — alle Secrets sind in der EXE eingebacken (siehe "Build EXEs").
        shell: pwsh
        run: |
          $suffix = if ("${{ github.ref_name }}" -eq "dev") { "PreRelease" } else { "Release" }
          $distZip = "TwitchAddon\dist\TwitchAddon-$suffix.zip"
          $staging = "TwitchAddon\dist\release"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging | Out-Null

          Copy-Item "TwitchAddon\dist\TwitchAddon.exe" $staging
          Copy-Item "TwitchAddon\dist\ngrok.exe"       $staging
          Copy-Item "TwitchAddon\overlay.html"         $staging
          if (Test-Path "TwitchAddon\media") {
            Copy-Item "TwitchAddon\media" $staging -Recurse
          }

          Compress-Archive -Path "$staging\*" -DestinationPath $distZip -Force

          Compress-Archive -Path "TwitchAddon\extension\*" -DestinationPath "TwitchAddon\dist\extension.zip" -Force

      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name == 'dev' && format('v{0}-dev.{1}', needs.compute-version.outputs.version, github.run_number) || format('v{0}', needs.compute-version.outputs.version) }}
          name: "TwitchAddon ${{ needs.compute-version.outputs.version }}${{ github.ref_name == 'dev' && '-dev' || '' }}"
          prerelease: ${{ github.ref_name == 'dev' }}
          body: |
            ${{ github.ref_name == 'dev' && '⚠️ **Pre-Release** – Build vom dev-Branch.' || '🚀 **Stabiler Release**' }}
            Commit: ${{ github.sha }}
          files: |
            TwitchAddon/dist/TwitchAddon-*.zip
            TwitchAddon/dist/extension.zip
            setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 4. Docker Images ───────────────────────────────────────────────
  docker:
    needs: [validate, compute-version]
    if: always() && (needs.validate.result == 'success')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: .
            file: Dockerfile
            image: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GHCR
        if: github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'dev'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=raw,value=v${{ needs.compute-version.outputs.version }},enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=raw,value=v${{ needs.compute-version.outputs.version }}-dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,prefix=sha-
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'dev' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_TWITCH_CLIENT_ID=${{ secrets.VITE_TWITCH_CLIENT_ID }}
  # ─── 5. Deployment Landingpage (Nur Main/Master) ─────────────────────
  deploy-pages:
    needs: validate
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Build
        run: |
          npm ci
          npx vite build
          cp dist/index.html dist/404.html
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TWITCH_CLIENT_ID: ${{ secrets.VITE_TWITCH_CLIENT_ID }}
          VITE_CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
  # ─── 6. Benachrichtigung bei Fehlern ────────────────────────────────
  notify-failure:
    needs: [compute-version, validate, release-twitchaddon, docker, deploy-pages]
    if: failure() # Wichtig: Triggert nur, wenn ein "needed" Job failed
    runs-on: ubuntu-latest
    steps:
      - name: Sende E-Mail
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 Pipeline Error in ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO_LIST }}
          from: "GitHub Pipeline <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Hallo,
            
            die Integrated CI/CD Pipeline ist fehlgeschlagen!
            
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Verursacht durch: ${{ github.actor }}
            
            Den genauen Fehler kannst du hier einsehen:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
