name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Job 1: Landingpage (React) — unverändert
  docker-landingpage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_TWITCH_CLIENT_ID=${{ secrets.VITE_TWITCH_CLIENT_ID }}

  # Job 2: TwitchAddon (Java-Backend)
  docker-twitchaddon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # Twitch OAuth Token holen
      - name: Get Twitch OAuth Access Token
        id: get_oauth
        run: |
          RESPONSE=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d client_id=${{ secrets.VITE_TWITCH_CLIENT_ID }} \
            -d client_secret=${{ secrets.TWITCH_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.TWITCH_REFRESH_TOKEN }})
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r .access_token)
          echo "::add-mask::$ACCESS_TOKEN"
          echo "TWITCH_OAUTH_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # .env für Maven-Build erstellen
      - name: Create .env file
        run: |
          mkdir -p TwitchAddon/src/main/resources
          printf 'SUPABASE_URL=%s\n'          "${{ secrets.VITE_SUPABASE_URL }}"      > TwitchAddon/src/main/resources/.env
          printf 'SUPABASE_API_KEY=%s\n'      "${{ secrets.SUPABASE_API_KEY }}"       >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_OAUTH_TOKEN=%s\n'    "${{ env.TWITCH_OAUTH_TOKEN }}"         >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_CLIENT_ID=%s\n'      "${{ secrets.VITE_TWITCH_CLIENT_ID }}"  >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_CLIENT_SECRET=%s\n'  "${{ secrets.TWITCH_CLIENT_SECRET }}"   >> TwitchAddon/src/main/resources/.env
          printf 'CHANNEL_NAME=%s\n'          "${{ secrets.CHANNEL_NAME }}"           >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_REFRESH_TOKEN=%s\n'  "${{ secrets.TWITCH_REFRESH_TOKEN }}"   >> TwitchAddon/src/main/resources/.env
          printf 'EXTENSION_CLIENT_ID=%s\n'   "${{ secrets.EXTENSION_CLIENT_ID }}"    >> TwitchAddon/src/main/resources/.env

      # Platzhalter in Extension-JS ersetzen
      - name: Inject config into extension JS files
        run: |
          EXT="TwitchAddon/src/main/resources/extension"
          iconv -f UTF-8 -t UTF-8 "$EXT/panel.js" \
            | sed \
                -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
                -e "s|__SUPABASE_URL__|${{ secrets.VITE_SUPABASE_URL }}|g" \
                -e "s|__SUPABASE_ANON_KEY__|${{ secrets.VITE_SUPABASE_ANON_KEY }}|g" \
            > "$EXT/panel.js.tmp" && mv "$EXT/panel.js.tmp" "$EXT/panel.js"
          iconv -f UTF-8 -t UTF-8 "$EXT/mobile.js" \
            | sed \
                -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
            > "$EXT/mobile.js.tmp" && mv "$EXT/mobile.js.tmp" "$EXT/mobile.js"

      # JAR bauen
      - name: Build Fat JAR
        run: mvn package -q
        working-directory: TwitchAddon

      # Docker login
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Metadata für twitchaddon Image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/twitchaddon
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Docker Image bauen und pushen
      # Das Dockerfile liegt in TwitchAddon/ und erwartet die JAR im selben Ordner
      - name: Build and push TwitchAddon Docker image
        uses: docker/build-push-action@v6
        with:
          context: TwitchAddon
          dockerfile: TwitchAddon/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}