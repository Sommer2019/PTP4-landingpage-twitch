name: Docker Build & Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Job 1: Landingpage (React) — unverändert
  docker-landingpage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_TWITCH_CLIENT_ID=${{ secrets.VITE_TWITCH_CLIENT_ID }}

  # Job 2: TwitchAddon (Bun-Backend)
  docker-twitchaddon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Platzhalter in den Extension-JS-Dateien ersetzen (neue Pfade nach Refactoring)
      - name: Inject config into extension JS files
        run: |
          EXT="TwitchAddon/extension"
          sed -i \
            -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
            -e "s|__SUPABASE_URL__|${{ secrets.VITE_SUPABASE_URL }}|g" \
            -e "s|__SUPABASE_ANON_KEY__|${{ secrets.VITE_SUPABASE_ANON_KEY }}|g" \
            "$EXT/panel.js"
          sed -i \
            -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
            "$EXT/mobile.js"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/twitchaddon
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # Secrets werden NICHT ins Image gebacken — beim Start per --env-file übergeben:
      # docker run --env-file TwitchAddon/.env ghcr.io/.../twitchaddon:latest
      - name: Build and push TwitchAddon Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TwitchAddon/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
