name: Build TwitchAddon EXE

on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
      TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
      TWITCH_CLIENT_ID: ${{ secrets.VITE_TWITCH_CLIENT_ID }}
      CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_REFRESH_TOKEN: ${{ secrets.TWITCH_REFRESH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build Fat JAR
        run: mvn package
        working-directory: TwitchAddon

      - name: Download Launch4j
        shell: bash
        run: |
          curl -L -f -sS "https://downloads.sourceforge.net/project/launch4j/launch4j-3/3.50/launch4j-3.50-win32.zip" -o launch4j.zip
          unzip launch4j.zip -d launch4j_bin

      - name: Get Twitch OAuth Access Token
        shell: bash
        id: get_oauth
        run: |
          RESPONSE=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d client_id=${{ secrets.VITE_TWITCH_CLIENT_ID }} \
            -d client_secret=${{ secrets.TWITCH_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.TWITCH_REFRESH_TOKEN }})
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r .access_token)
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Fehler beim Abrufen des Access Tokens: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"  # <--- DAS HIER FEHLT NOCH!
echo "TWITCH_OAUTH_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Create .env file for build
        shell: pwsh
        run: |
          # Wir erstellen die Datei direkt, ohne die Werte per 'echo' in die Konsole zu schreiben
          $envContent = @(
            "SUPABASE_URL=${{ secrets.SUPABASE_URL }}",
            "SUPABASE_API_KEY=${{ secrets.SUPABASE_API_KEY }}",
            "TWITCH_OAUTH_TOKEN=$env:TWITCH_OAUTH_TOKEN",
            "TWITCH_CLIENT_ID=${{ secrets.VITE_TWITCH_CLIENT_ID }}",
            "CHANNEL_NAME=${{ secrets.CHANNEL_NAME }}"
          )
          $envContent | Out-File -FilePath "TwitchAddon/.env" -Encoding utf8
        env:
          TWITCH_OAUTH_TOKEN: ${{ env.TWITCH_OAUTH_TOKEN }}


      - name: Prepare dist folder
        # Wir nutzen den relativen Pfad direkt im Arbeitsverzeichnis
        run: mkdir -p dist
        working-directory: TwitchAddon

      - name: Build EXE with Launch4j
        shell: pwsh
        run: |
          # 1. Suche die exe (bleibt gleich)
          $l4jExe = Get-ChildItem -Path "${{ github.workspace }}" -Filter "launch4jc.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          # 2. Debug: Zeig uns, wo wir sind und was da ist
          Write-Host "Aktueller Pfad: $(Get-Location)"
          Write-Host "Suche JAR in target/..."
          Get-ChildItem -Path "target" -Filter "*.jar"
          
          # 3. Launch4j ausführen
          # Wir übergeben den Pfad zur XML absolut, damit es keine Missverständnisse gibt
          & $l4jExe "${{ github.workspace }}/TwitchAddon/launch4j-config.xml"
        working-directory: TwitchAddon


      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchAddon-exe
          path: TwitchAddon/dist/*.exe

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          # Das "v-" davor ist wichtig, um die 40-Zeichen-Hex-Regel zu umgehen!
          tag_name: v-${{ github.sha }}
          name: TwitchAddon Build ${{ github.run_number }}
          # Hier direkt die Dateien angeben:
          files: TwitchAddon/dist/*.exe
          draft: false
          prerelease: false
          # Falls der Run neu gestartet wird, überschreibt er existierende Dateien
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
