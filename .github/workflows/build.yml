name: Build TwitchAddon EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
      TWITCH_OAUTH_TOKEN: ${{ secrets.TWITCH_OAUTH_TOKEN }}
      TWITCH_CLIENT_ID: ${{ secrets.VITE_TWITCH_CLIENT_ID }}
      CHANNEL_NAME: ${{ secrets.CHANNEL_NAME }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_REFRESH_TOKEN: ${{ secrets.TWITCH_REFRESH_TOKEN }}
      EXTENSION_CLIENT_ID: ${{ secrets.EXTENSION_CLIENT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # 1. Token holen
      - name: Get Twitch OAuth Access Token
        shell: bash
        id: get_oauth
        run: |
          RESPONSE=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d client_id=${{ secrets.VITE_TWITCH_CLIENT_ID }} \
            -d client_secret=${{ secrets.TWITCH_CLIENT_SECRET }} \
            -d grant_type=refresh_token \
            -d refresh_token=${{ secrets.TWITCH_REFRESH_TOKEN }})
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r .access_token)
          echo "::add-mask::$ACCESS_TOKEN"
          echo "TWITCH_OAUTH_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      # 2. .env im Resources-Ordner erstellen (bash statt pwsh → kein BOM, kein Encoding-Problem)
      - name: Create .env file for build
        shell: bash
        run: |
          mkdir -p TwitchAddon/src/main/resources
          printf 'SUPABASE_URL=%s\n'          "${{ secrets.VITE_SUPABASE_URL }}"      > TwitchAddon/src/main/resources/.env
          printf 'SUPABASE_API_KEY=%s\n'      "${{ secrets.SUPABASE_API_KEY }}"       >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_OAUTH_TOKEN=%s\n'    "${{ env.TWITCH_OAUTH_TOKEN }}"         >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_CLIENT_ID=%s\n'      "${{ secrets.VITE_TWITCH_CLIENT_ID }}"  >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_CLIENT_SECRET=%s\n'  "${{ secrets.TWITCH_CLIENT_SECRET }}"   >> TwitchAddon/src/main/resources/.env
          printf 'CHANNEL_NAME=%s\n'          "${{ secrets.CHANNEL_NAME }}"           >> TwitchAddon/src/main/resources/.env
          printf 'TWITCH_REFRESH_TOKEN=%s\n'  "${{ secrets.TWITCH_REFRESH_TOKEN }}"   >> TwitchAddon/src/main/resources/.env
          printf 'EXTENSION_CLIENT_ID=%s\n'   "${{ secrets.EXTENSION_CLIENT_ID }}"    >> TwitchAddon/src/main/resources/.env

      # 3. Platzhalter in den JS-Dateien ersetzen
      #    - shell: bash damit sed verfügbar ist (auch auf windows-latest via Git Bash)
      #    - Umweg über .tmp-Datei wegen sed -i Inkompatibilität auf Windows
      #    - iconv stellt sicher dass UTF-8 ohne BOM rauskommt
      - name: Inject config into extension JS files
        shell: bash
        run: |
          EXT="TwitchAddon/src/main/resources/extension"

          iconv -f UTF-8 -t UTF-8 "$EXT/panel.js" \
            | sed \
                -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
                -e "s|__SUPABASE_URL__|${{ secrets.VITE_SUPABASE_URL }}|g" \
                -e "s|__SUPABASE_ANON_KEY__|${{ secrets.VITE_SUPABASE_ANON_KEY }}|g" \
            > "$EXT/panel.js.tmp" && mv "$EXT/panel.js.tmp" "$EXT/panel.js"

          iconv -f UTF-8 -t UTF-8 "$EXT/mobile.js" \
            | sed \
                -e "s|__EBS_BASE_URL__|${{ secrets.EBS_BASE_URL }}|g" \
            > "$EXT/mobile.js.tmp" && mv "$EXT/mobile.js.tmp" "$EXT/mobile.js"

      # 4. Maven (packt alles unter resources/extension/ ins JAR)
      - name: Build Fat JAR
        run: mvn package
        working-directory: TwitchAddon

      # 5. Launch4j downloaden
      - name: Download Launch4j
        shell: bash
        run: |
          curl -L -f -sS "https://downloads.sourceforge.net/project/launch4j/launch4j-3/3.50/launch4j-3.50-win32.zip" -o launch4j.zip
          unzip launch4j.zip -d launch4j_bin

      - name: Prepare dist folder
        run: mkdir -p dist
        working-directory: TwitchAddon

      # 6. EXE bauen
      - name: Build EXE with Launch4j
        shell: pwsh
        run: |
          $l4jExe = Get-ChildItem -Path "${{ github.workspace }}" -Filter "launch4jc.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          & $l4jExe "${{ github.workspace }}/TwitchAddon/launch4j-config.xml"
        working-directory: TwitchAddon

      # 7. Extension-Ordner als ZIP verpacken (mit bereits eingesetzten Werten)
      - name: Zip extension folder
        shell: bash
        run: |
          cd TwitchAddon/src/main/resources/extension
          zip -r "$GITHUB_WORKSPACE/TwitchAddon/dist/extension.zip" .

      # 8. Release
      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-${{ github.sha }}
          name: TwitchAddon Build ${{ github.run_number }}
          files: |
            TwitchAddon/dist/*.exe
            TwitchAddon/target/ChannelPointsBot-1.0-SNAPSHOT.jar
            TwitchAddon/dist/extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}