name: Manage Voting Rounds

on:
  schedule:
    - cron: '0 6 * * *'           # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        required: false
        type: choice
        default: 'auto'
        options:
          - auto
          - start_round2
          - end_round2
          - start_yearly
          - end_yearly

jobs:
  manage:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run round management
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACTION: ${{ github.event.inputs.action || 'auto' }}
        run: npx tsx .github/scripts/manage-rounds.ts
