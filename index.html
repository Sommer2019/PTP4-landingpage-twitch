<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <link rel="icon" type="image/png" href="/img/logo128.png" />
    <link rel="apple-touch-icon" href="/img/logo128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HD – Streamplan, Ressourcen, Socials und Clips." />
    <title>HD1920x1080</title>
    <link rel="preconnect" href="https://assets.twitch.tv">
    <link rel="preconnect" href="https://player.twitch.tv">
    <link rel="preconnect" href="https://k.twitchcdn.net">
    <link rel="preconnect" href="https://gql.twitch.tv">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker für SPA-Routing Fallback registrieren
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('[SPA] Service Worker registriert:', registration.scope)
            })
            .catch((error) => {
              console.warn('[SPA] Service Worker Registrierung fehlgeschlagen:', error)
            })
        })
      }
    </script>
  </body>
</html>
