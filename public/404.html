<!DOCTYPE html>
<html lang="de">
  <head>
    <!-- Meta-Refresh entfernt, damit SPA-Fallback funktioniert -->
    <script>
      // SPA-Fallback für GitHub Pages
      // Leitet auf die aktuelle Pfad-URL weiter, ohne Hash!
      (function() {
        var pathname = window.location.pathname;
        var search = window.location.search;
        // Nur weiterleiten, wenn nicht auf der Root-Seite
        if (pathname !== '/') {
          window.location.replace(window.location.origin + pathname + search);
        }
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>Falls du nicht automatisch weitergeleitet wirst, <a href="/">hier klicken</a>.</p>
  </body>
</html>
